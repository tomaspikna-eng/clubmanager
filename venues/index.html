<!doctype html><html lang="sk"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Športoviská — CSP Club Manager</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet"><link rel="stylesheet" href="../assets/styles.css"></head><body><div class="app"><aside class="sidebar"><div class="brand"><div class="brand-mark">C</div><div><div class="brand-name"><span>Connect</span>Sports<span>Pro</span></div><div class="brand-sub">Club Manager</div></div></div><a class="nav-link" href="../dashboard/">📊 Dashboard</a><div class="nav-title">Správa</div><a class="nav-link active" href="../venues/">🎱 Športoviská</a></aside><main class="main"><header class="topbar"><div><strong id="clubName">Club Manager</strong> · Športoviská</div><button class="ghost" id="logout">Odhlásiť</button></header><section class="content"><div class="page-head"><h1>Športoviská a stanice</h1><p>Vytvor miestnosť a konkrétne stoly, terče alebo dráhy.</p></div><div id="notice"></div><section class="panel"><h3>Nová stanica</h3><div class="form-grid"><select id="venue"></select><input id="name" placeholder="Názov, napr. Stôl 1"><input id="sport" placeholder="Šport, napr. Biliard"><input id="rate" type="number" min="0" step="0.10" placeholder="Cena / hod."><button class="primary" id="add">Pridať</button></div></section><section class="panel"><table class="table"><thead><tr><th>Názov</th><th>Šport</th><th>Športovisko</th><th>Cena/h</th><th>Stav</th></tr></thead><tbody id="rows"><tr><td colspan="5">Načítavam…</td></tr></tbody></table></section></section></main></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../assets/config.js"></script><script src="../assets/app.js"></script><script>const A=CSPClubManager;let ctx,venues=[],stations=[];logout.onclick=A.logout;async function load(){ctx=await A.requireAccess();clubName.textContent=ctx.club?.name||'Klub';if(!ctx.club){rows.innerHTML='<tr><td colspan="5">Klub neexistuje.</td></tr>';return}const [v,s]=await Promise.all([A.db.from('venues').select('*').eq('club_id',ctx.club.id).eq('is_active',true).order('name'),A.db.from('stations').select('*,venues(name)').eq('club_id',ctx.club.id).order('sort_order')]);if(v.error||s.error)throw v.error||s.error;venues=v.data;stations=s.data;venue.innerHTML=venues.map(x=>`<option value="${x.id}">${x.name}</option>`).join('');rows.innerHTML=stations.map(x=>`<tr><td>${x.name}</td><td>${x.sport}</td><td>${x.venues?.name||'—'}</td><td>${A.money(x.base_hourly_rate)}</td><td>${x.status}</td></tr>`).join('')||'<tr><td colspan="5">Zatiaľ nie sú vytvorené žiadne stanice.</td></tr>'}add.onclick=async()=>{if(!ctx?.club||!name.value.trim()||!sport.value.trim())return;const {error}=await A.db.from('stations').insert({club_id:ctx.club.id,venue_id:venue.value||null,name:name.value.trim(),sport:sport.value.trim(),base_hourly_rate:Number(rate.value||0),status:'idle'});if(error){notice.innerHTML=`<div class="notice">${error.message}</div>`;return}name.value='';sport.value='';rate.value='';await load()};load().catch(e=>{if(!['PLAN_REQUIRED','LOGIN_REQUIRED'].includes(e.message))rows.innerHTML=`<tr><td colspan="5">${e.message}</td></tr>`});</script></body></html>
