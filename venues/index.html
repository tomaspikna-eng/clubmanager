<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Športoviská — CSP Club Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="brand-mark">C</div><div><div class="brand-name"><span>Connect</span>Sports<span>Pro</span></div><div class="brand-sub">Club Manager</div></div></div>
    <a class="nav-link" href="../dashboard/">📊 Dashboard</a>
    <div class="nav-title">Správa</div>
    <a class="nav-link active" href="../venues/">🎱 Športoviská</a>
  </aside>
  <main class="main">
    <header class="topbar"><div><strong id="clubName">Club Manager</strong> · Športoviská</div><button class="ghost" id="logoutBtn">Odhlásiť</button></header>
    <section class="content">
      <div class="page-head"><h1>Športoviská a stanice</h1><p>Vytvor miestnosť a konkrétne stoly, terče alebo dráhy.</p></div>
      <div id="notice"></div>
      <section class="panel"><h3>Nová stanica</h3><div class="form-grid">
        <select id="venueSelect"></select>
        <input id="stationName" placeholder="Názov, napr. Stôl 1">
        <input id="stationSport" placeholder="Šport, napr. Biliard">
        <input id="stationRate" type="number" min="0" step="0.10" placeholder="Cena / hod.">
        <button class="primary" id="addStationBtn">Pridať</button>
      </div></section>
      <section class="panel"><table class="table"><thead><tr><th>Názov</th><th>Šport</th><th>Športovisko</th><th>Cena/h</th><th>Stav</th></tr></thead><tbody id="stationRows"><tr><td colspan="5">Načítavam…</td></tr></tbody></table></section>
    </section>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/app.js"></script>
<script>
(() => {
  'use strict';
  const A = window.CSPClubManager;
  const clubNameEl = document.getElementById('clubName');
  const logoutBtn = document.getElementById('logoutBtn');
  const venueSelect = document.getElementById('venueSelect');
  const stationNameInput = document.getElementById('stationName');
  const stationSportInput = document.getElementById('stationSport');
  const stationRateInput = document.getElementById('stationRate');
  const addStationBtn = document.getElementById('addStationBtn');
  const stationRows = document.getElementById('stationRows');
  const notice = document.getElementById('notice');
  let ctx = null;
  logoutBtn.addEventListener('click', () => A.logout());
  const showNotice = (message) => { notice.innerHTML = message ? `<div class="notice">${message}</div>` : ''; };
  async function load() {
    ctx = await A.requireAccess();
    clubNameEl.textContent = ctx.club?.name || 'Klub';
    if (!ctx.club) { stationRows.innerHTML = '<tr><td colspan="5">Klub neexistuje.</td></tr>'; addStationBtn.disabled = true; return; }
    const [v, s] = await Promise.all([
      A.db.from('venues').select('*').eq('club_id', ctx.club.id).eq('is_active', true).order('name'),
      A.db.from('stations').select('*,venues(name)').eq('club_id', ctx.club.id).order('sort_order')
    ]);
    if (v.error || s.error) throw v.error || s.error;
    const venues = v.data || [];
    const stations = s.data || [];
    venueSelect.innerHTML = venues.length ? venues.map(x => `<option value="${x.id}">${x.name}</option>`).join('') : '<option value="">Bez športoviska</option>';
    stationRows.innerHTML = stations.length ? stations.map(x => `<tr><td>${x.name}</td><td>${x.sport}</td><td>${x.venues?.name || '—'}</td><td>${A.money(x.base_hourly_rate)}</td><td>${x.status}</td></tr>`).join('') : '<tr><td colspan="5">Zatiaľ nie sú vytvorené žiadne stanice.</td></tr>';
  }
  addStationBtn.addEventListener('click', async () => {
    showNotice('');
    const stationName = stationNameInput.value.trim();
    const stationSport = stationSportInput.value.trim();
    const hourlyRate = Number(stationRateInput.value || 0);
    if (!ctx?.club) return showNotice('Klubový profil nie je načítaný.');
    if (!stationName) { showNotice('Zadaj názov stanice.'); stationNameInput.focus(); return; }
    if (!stationSport) { showNotice('Zadaj šport.'); stationSportInput.focus(); return; }
    if (!Number.isFinite(hourlyRate) || hourlyRate < 0) { showNotice('Cena za hodinu musí byť platné nezáporné číslo.'); stationRateInput.focus(); return; }
    addStationBtn.disabled = true;
    addStationBtn.textContent = 'Ukladám…';
    try {
      const { error } = await A.db.from('stations').insert({ club_id: ctx.club.id, venue_id: venueSelect.value || null, name: stationName, sport: stationSport, base_hourly_rate: hourlyRate, status: 'idle', is_active: true });
      if (error) throw error;
      stationNameInput.value = '';
      stationSportInput.value = '';
      stationRateInput.value = '';
      await load();
      showNotice('Stanica bola uložená.');
    } catch (error) {
      showNotice(error?.message || 'Stanica sa nepodarila uložiť.');
    } finally {
      addStationBtn.disabled = false;
      addStationBtn.textContent = 'Pridať';
    }
  });
  load().catch(error => { if (!['PLAN_REQUIRED', 'LOGIN_REQUIRED'].includes(error.message)) stationRows.innerHTML = `<tr><td colspan="5">${error.message}</td></tr>`; });
})();
</script>
</body>
</html>
