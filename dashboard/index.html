<!doctype html><html lang="sk"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dashboard — CSP Club Manager</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="../assets/styles.css"><style>
.station-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.score-link{background:rgba(212,168,67,.12);border:1px solid #d4a843;color:#d4a843}
.qr-link{background:#181818;border:1px solid rgba(255,255,255,.14);color:#fff}
.qr-overlay{position:fixed;inset:0;z-index:3000;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.78)}
.qr-overlay.hidden{display:none}.qr-modal{width:min(480px,100%);background:#111;border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:22px}
.qr-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:16px}.qr-sub{margin-top:5px;color:#9ca3af;font-size:13px}
.qr-code-wrap{width:280px;max-width:100%;min-height:280px;margin:0 auto 16px;padding:14px;display:grid;place-items:center;border-radius:14px;background:#fff}
.qr-url{width:100%;padding:10px;border-radius:9px;border:1px solid rgba(255,255,255,.12);background:#161616;color:#fff}
.qr-actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}
@media(max-width:520px){.qr-actions,.station-actions{grid-template-columns:1fr}}
</style></head><body><div class="app"><aside class="sidebar"><div class="brand"><div class="brand-mark">C</div><div><div class="brand-name"><span>Connect</span>Sports<span>Pro</span></div><div class="brand-sub">Club Manager</div></div></div><a class="nav-link active" href="../dashboard/">📊 Dashboard</a><div class="nav-title">Prevádzka</div><a class="nav-link" href="../dashboard/">⏱️ Live prevádzka</a><a class="nav-link" href="#">🖥️ Scoreboardy</a><a class="nav-link" href="#">📅 Rezervácie</a><div class="nav-title">Správa</div><a class="nav-link" href="../venues/">🎱 Športoviská</a></aside><main class="main"><header class="topbar"><div><strong id="clubName">Club Manager</strong> · Dashboard obsluhy</div><button class="ghost" id="logout">Odhlásiť</button></header><section class="content"><div class="page-head"><h1>Dashboard obsluhy</h1><p>Live prevádzka stolov, terčov a dráh.</p></div><div id="notice"></div><div class="stats" id="stats"></div><div class="toolbar"><input id="search" placeholder="Hľadať športovisko..."><div class="chips" id="chips"></div></div><div class="grid" id="grid"><div class="empty">Načítavam…</div></div></section></main></div><div class="qr-overlay hidden" id="qrOverlay">
<div class="qr-modal"><div class="qr-head"><div><h3 id="qrTitle">Pripojiť tablet</h3><div class="qr-sub" id="qrSubtitle"></div></div><button class="ghost" id="qrCloseBtn">✕</button></div>
<div class="qr-code-wrap" id="qrCode"></div><input class="qr-url" id="qrUrl" readonly>
<div class="qr-actions"><button class="primary" id="qrOpenBtn">Otvoriť scoreboard</button><button class="ghost" id="qrCopyBtn">Kopírovať link</button></div></div></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script><script src="../assets/config.js"></script><script src="../assets/app.js"></script><script>
const A=CSPClubManager;let ctx,stations=[],sessions=[],profiles=[],sport='all';logout.onclick=A.logout;search.oninput=render;
function sessionFor(id){return sessions.find(s=>s.station_id===id&&['running','paused','stopped'].includes(s.status))}
async function load(){ctx=await A.requireAccess();clubName.textContent=ctx.club?.name||'Klub nie je vytvorený';if(!ctx.club){grid.innerHTML='<div class="empty">Najprv vytvor klub a športoviská.</div>';return}const [st,se,pr]=await Promise.all([A.db.from('stations').select('*').eq('club_id',ctx.club.id).eq('is_active',true).order('sort_order'),A.db.from('club_manager_live_sessions').select('*').eq('club_id',ctx.club.id).in('status',['running','paused','stopped']),A.db.from('club_manager_price_profiles').select('*').eq('club_id',ctx.club.id).eq('is_active',true).order('sort_order')]);if(st.error||se.error||pr.error)throw st.error||se.error||pr.error;stations=st.data;sessions=se.data;profiles=pr.data;buildChips();render()}
function buildChips(){const sports=[...new Set(stations.map(x=>x.sport))];chips.innerHTML=`<button class="chip ${sport==='all'?'active':''}" onclick="setSport('all')">Všetko</button>`+sports.map(x=>`<button class="chip ${sport===x?'active':''}" onclick="setSport('${x.replaceAll("'","\\'")}')">${x}</button>`).join('')}
function setSport(s){sport=s;buildChips();render()}
async function start(id){const code=document.getElementById('profile-'+id).value;const {error}=await A.db.rpc('club_manager_start_session',{p_station_id:id,p_price_profile_code:code});if(error)return showError(error.message);await load()}
async function pause(id){const {error}=await A.db.rpc('club_manager_pause_session',{p_session_id:id});if(error)return showError(error.message);await load()}
async function resume(id){const {error}=await A.db.rpc('club_manager_resume_session',{p_session_id:id});if(error)return showError(error.message);await load()}
async function stop(id){const {error}=await A.db.rpc('club_manager_stop_session',{p_session_id:id});if(error)return showError(error.message);await load()}
async function settle(id){const {error}=await A.db.rpc('club_manager_settle_session',{p_session_id:id});if(error)return showError(error.message);await load()}
function showError(msg){notice.innerHTML=`<div class="notice">${msg}</div>`;setTimeout(()=>notice.innerHTML='',5000)}
function scoreboardSport(st){const v=String(st?.sport||'').toLowerCase();if(v.includes('dart')||v.includes('šíp'))return'darts';if(v.includes('billiard')||v.includes('biliard')||v.includes('pool'))return'billiard';return'other'}
function scoreboardDiscipline(st){const s=scoreboardSport(st);return s==='darts'?'501':s==='billiard'?'8-ball':'Univerzál'}
function scoreboardUrl(st){const u=new URL('/scoreboard/',location.origin);u.searchParams.set('station',st.name);u.searchParams.set('sport',scoreboardSport(st));u.searchParams.set('discipline',scoreboardDiscipline(st));u.searchParams.set('players','2');u.searchParams.set('race','5');u.searchParams.set('lock','1');if(st.token)u.searchParams.set('station_token',st.token);u.searchParams.set('from',location.href);return u.toString()}
function openScoreboard(id){const st=stations.find(x=>x.id===id);if(st)window.open(scoreboardUrl(st),'_blank','noopener')}
function openQr(id){const st=stations.find(x=>x.id===id);if(!st)return;const url=scoreboardUrl(st);qrTitle.textContent=st.name;qrSubtitle.textContent=`${st.sport} · naskenuj tabletom`;qrUrl.value=url;qrOpenBtn.dataset.url=url;qrCode.innerHTML='';new QRCode(qrCode,{text:url,width:252,height:252});qrOverlay.classList.remove('hidden')}
function closeQr(){qrOverlay.classList.add('hidden')}
qrCloseBtn.onclick=closeQr;qrOverlay.onclick=e=>{if(e.target===qrOverlay)closeQr()};qrOpenBtn.onclick=()=>window.open(qrOpenBtn.dataset.url,'_blank','noopener');
qrCopyBtn.onclick=async()=>{try{await navigator.clipboard.writeText(qrUrl.value)}catch{qrUrl.select();document.execCommand('copy')}showError('Link na scoreboard bol skopírovaný.')};
function stationAccessButtons(st){return `<div class="station-actions"><button class="action score-link" onclick="openScoreboard('${st.id}')">🖥️ Scoreboard</button><button class="action qr-link" onclick="openQr('${st.id}')">▦ QR pre tablet</button></div>`}

function card(st){const s=sessionFor(st.id),access=stationAccessButtons(st);
if(!s)return `<article class="station"><div class="station-top"><span class="station-name">${st.name}</span><span class="station-sport">${st.sport}</span></div><select id="profile-${st.id}">${profiles.map(p=>`<option value="${p.code}">${p.name}</option>`).join('')}</select><button class="action start" onclick="start('${st.id}')">▶ Spustiť</button>${access}</article>`;
if(s.status==='stopped')return `<article class="station stopped"><div class="station-top"><span class="station-name">${st.name}</span><span class="station-sport">${A.time(s.accumulated_seconds)}</span></div><div class="total">${A.money(s.total_amount)}</div><button class="action settle" onclick="settle('${s.id}')">✓ Zapísané do kasy</button>${access}</article>`;
const paused=s.status==='paused';return `<article class="station running" data-session="${s.id}"><div class="station-top"><span class="station-name">${st.name}</span><span class="station-sport">${s.customer_type}${paused?' · PAUZA':''}</span></div><div class="timer">${A.time(A.currentSeconds(s))}</div><button class="action pause" onclick="${paused?'resume':'pause'}('${s.id}')">${paused?'▶ Pokračovať':'⏸ Pauza'}</button><button class="action stop" onclick="stop('${s.id}')">⏹ Stop</button>${access}</article>`}
function render(){const q=search.value.toLowerCase();const list=stations.filter(x=>(sport==='all'||x.sport===sport)&&(!q||x.name.toLowerCase().includes(q)));grid.innerHTML=list.map(card).join('')||'<div class="empty">Žiadne športoviská. Vytvor ich v sekcii Športoviská.</div>';const running=sessions.filter(x=>['running','paused'].includes(x.status)).length,stopped=sessions.filter(x=>x.status==='stopped').length;stats.innerHTML=`<div class="stat"><b>${running}</b><span>beží práve teraz</span></div><div class="stat"><b>${stopped}</b><span>čaká na kasu</span></div><div class="stat"><b>${stations.length}</b><span>staníc spolu</span></div>`}
setInterval(()=>sessions.filter(s=>s.status==='running').forEach(s=>{const el=document.querySelector(`[data-session="${s.id}"] .timer`);if(el)el.textContent=A.time(A.currentSeconds(s))}),1000);load().catch(e=>{if(!['PLAN_REQUIRED','LOGIN_REQUIRED'].includes(e.message))grid.innerHTML=`<div class="empty">${e.message}</div>`});
</script></body></html>
