<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prihlásenie — CSP Club Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
<style>
.login{min-height:100vh;display:grid;place-items:center;padding:24px}
.login-card{width:min(420px,100%);background:var(--card);border:1px solid var(--line);border-radius:14px;padding:28px}
.login-card .brand{padding:0 0 22px}
.login-card h1{margin:0 0 8px}
.login-card p{color:var(--muted)}
.login-card input{width:100%;padding:12px;margin:7px 0;background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--fg)}
.login-card button{width:100%;padding:12px;margin-top:10px;border:0;border-radius:9px;background:var(--gold);font-weight:800;color:#1a1000;cursor:pointer}
.login-card button:disabled{opacity:.6;cursor:wait}
.error{color:#ff8e88;min-height:20px;font-size:13px}
.session-note{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.45}
</style>
</head>
<body>
<main class="login">
  <section class="login-card">
    <div class="brand">
      <div class="brand-mark">C</div>
      <div>
        <div class="brand-name"><span>Connect</span>Sports<span>Pro</span></div>
        <div class="brand-sub">Club Manager</div>
      </div>
    </div>

    <h1>Prihlásenie</h1>
    <p>Prístup je aktívny pre Ultra, Elite a Admin.</p>

    <form id="loginForm">
      <input id="loginEmail" type="email" placeholder="E-mail" autocomplete="email" required>
      <input id="loginPassword" type="password" placeholder="Heslo" autocomplete="current-password" required>
      <div class="error" id="loginError"></div>
      <button id="loginButton" type="submit">Prihlásiť sa</button>
    </form>

    <div class="session-note">
      Táto stránka vždy zostáva prihlasovacou obrazovkou. Do dashboardu sa pokračuje až po potvrdení prihlásenia.
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/app.js"></script>
<script>
(() => {
  'use strict';

  const A = window.CSPClubManager;
  const form = document.getElementById('loginForm');
  const emailInput = document.getElementById('loginEmail');
  const passwordInput = document.getElementById('loginPassword');
  const errorBox = document.getElementById('loginError');
  const button = document.getElementById('loginButton');

  // Zámerne žiadny automatický redirect pri existujúcej session.
  // Login stránka musí zostať login stránkou po každom otvorení CTA z hlavného CSP webu.

  form.addEventListener('submit', async (event) => {
    event.preventDefault();

    errorBox.textContent = '';
    button.disabled = true;
    button.textContent = 'Prihlasujem…';

    try {
      // Odstráni prípadnú starú lokálnu session Club Managera,
      // aby sa vždy vykonalo explicitné prihlásenie z formulára.
      await A.db.auth.signOut({ scope: 'local' });

      const { error } = await A.db.auth.signInWithPassword({
        email: emailInput.value.trim(),
        password: passwordInput.value
      });

      if (error) throw error;

      const params = new URLSearchParams(location.search);
      const returnTo = params.get('returnTo');

      location.replace(returnTo || A.route('dashboard/'));
    } catch (error) {
      errorBox.textContent = error?.message || 'Prihlásenie zlyhalo.';
      button.disabled = false;
      button.textContent = 'Prihlásiť sa';
    }
  });
})();
</script>
</body>
</html>
